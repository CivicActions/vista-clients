# Pre-commit configuration
# See https://pre-commit.com for more information
# See https://docs.astral.sh/ruff/integrations/#pre-commit for Ruff integration

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version - keep in sync with pyproject.toml if pinned there
    rev: v0.11.11
    hooks:
      # Run the linter with auto-fix
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  # TODO: Replace local hook with official ty pre-commit hook when available
  # (https://github.com/astral-sh/ty/issues/269)
  - repo: local
    hooks:
      - id: ty
        name: ty type check
        # Check src/ at maximum strictness, excluding backend files with
        # lazy-loaded SDK imports that produce unresolvable errors.
        entry: uv run ty check --python-version 3.10 --error-on-warning src/
        language: system
        types: [python]
        pass_filenames: false

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --all-extras
      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    services:
      vehu:
        image: worldvista/vehu:latest
        ports:
          - 9430:9430
          - 2222:22
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev --all-extras

      - name: Run unit and contract tests
        run: uv run pytest tests/unit tests/contract -q

      - name: Wait for VEHU
        run: |
          for i in $(seq 1 60); do
            if nc -z localhost 9430 2>/dev/null && nc -z localhost 2222 2>/dev/null; then
              echo "VEHU is ready"
              exit 0
            fi
            echo "Waiting for VEHU... ($i/60)"
            sleep 5
          done
          echo "VEHU did not become ready in time"
          exit 1

      - name: Run smoke tests
        run: uv run pytest tests/smoke -v

  publish:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
